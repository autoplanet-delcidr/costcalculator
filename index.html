<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Precios — Auto Planet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #111111;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }
 
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 720px;
    }
 
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
    }
 
    .card {
      background: #1a1a1a;
      border: 0.5px solid #2e2e2e;
      border-radius: 14px;
      padding: 1.5rem;
    }
 
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: #b8972a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 7px;
    }
 
    .card-title svg {
      width: 16px;
      height: 16px;
      stroke: #b8972a;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
 
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
      margin-top: 12px;
    }
 
    label:first-of-type { margin-top: 0; }
 
    input[type="number"] {
      width: 100%;
      background: #111;
      border: 0.5px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 15px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
 
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
 
    input[type="number"]:focus { border-color: #b8972a; }
 
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
 
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #b8972a;
      border-radius: 50%;
      cursor: pointer;
    }
 
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #b8972a;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
 
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
 
    .slider-val {
      font-size: 14px;
      font-weight: 500;
      color: #f0f0f0;
      min-width: 38px;
      text-align: right;
    }
 
    .factor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 8px;
    }
 
    .factor-btn {
      background: #111;
      border: 0.5px solid #333;
      border-radius: 8px;
      padding: 8px 6px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1.4;
    }
 
    .factor-btn:hover { border-color: #b8972a; }
 
    .factor-btn.active {
      border: 1.5px solid #b8972a;
      background: #1f1a0e;
      color: #e4ba4a;
    }
 
    .factor-name { display: block; font-weight: 500; }
    .factor-val { font-size: 11px; opacity: 0.7; }
 
    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
 
    .custom-row .factor-btn { flex: 1; }
 
    #cc-custom-val {
      width: 90px;
      display: none;
      flex-shrink: 0;
    }
 
    .result-box {
      background: #111;
      border: 0.5px solid #2e2e2e;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-top: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
 
    .result-label {
      font-size: 12px;
      color: #666;
    }
 
    .result-value {
      font-size: 26px;
      font-weight: 600;
      color: #b8972a;
      letter-spacing: -0.01em;
    }
 
    .formula-hint {
      font-size: 11px;
      color: #444;
      margin-top: 8px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
 
  <div class="grid">
 
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        Precio nuevo
      </div>
 
      <label>Costo</label>
      <input type="number" id="pc-costo" placeholder="0.00" min="0" step="0.01" oninput="calcPrecio()">
 
      <label>Ganancia</label>
      <div class="slider-row">
        <input type="range" min="1.0" max="3.0" step="0.05" value="1.30" id="pc-ganancia-slider" oninput="syncGanancia(this)">
        <span class="slider-val" id="pc-ganancia-display">1.30</span>
      </div>
      <input type="number" id="pc-ganancia" placeholder="1.30" min="0.01" step="0.01" value="1.30" oninput="syncGananciaInput(this); calcPrecio()">
 
      <div class="result-box">
        <span class="result-label">Precio nuevo</span>
        <span class="result-value" id="pc-result">—</span>
      </div>
      <p class="formula-hint">Costo × 1.15 × 1.011 × Ganancia</p>
    </div>
 
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
        Costo tentativo
      </div>
 
      <label>Precio</label>
      <input type="number" id="cc-precio" placeholder="0.00" min="0" step="0.01" oninput="calcCosto()">
 
      <label>Factor de origen</label>
      <div class="factor-grid">
        <button class="factor-btn" onclick="selectFactor(1.25, this)">
          <span class="factor-name">🇨🇳 China</span>
          <span class="factor-val">1.25</span>
        </button>
        <button class="factor-btn" onclick="selectFactor(1.15, this)">
          <span class="factor-name">🇹🇼 Taiwan</span>
          <span class="factor-val">1.15</span>
        </button>
        <button class="factor-btn" onclick="selectFactor(1.10, this)">
          <span class="factor-name">🇵🇦 Panama/Miami</span>
          <span class="factor-val">1.10</span>
        </button>
        <button class="factor-btn" onclick="selectFactor(1.35, this)">
          <span class="factor-name">🛞 Llantas</span>
          <span class="factor-val">1.35</span>
        </button>
      </div>
      <div class="custom-row">
        <button class="factor-btn" id="custom-btn" onclick="selectCustom(this)">
          <span class="factor-name">✏️ Custom</span>
        </button>
        <input type="number" id="cc-custom-val" placeholder="Factor" min="0.01" step="0.01" oninput="applyCustomFactor()">
      </div>
 
      <div class="result-box">
        <span class="result-label">Costo tentativo <span id="cc-factor-label" style="font-size:11px;opacity:0.6;"></span></span>
        <span class="result-value" id="cc-result">—</span>
      </div>
      <p class="formula-hint">Precio × Factor × 26.6</p>
    </div>
 
  </div>
 
  <script>
    let selectedFactor = null;
 
    function selectFactor(val, btn) {
      selectedFactor = val;
      document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cc-custom-val').style.display = 'none';
      document.getElementById('cc-factor-label').textContent = '× ' + val;
      calcCosto();
    }
 
    function selectCustom(btn) {
      document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const input = document.getElementById('cc-custom-val');
      input.style.display = 'inline-block';
      input.focus();
      selectedFactor = parseFloat(input.value) || null;
      document.getElementById('cc-factor-label').textContent = selectedFactor ? '× ' + selectedFactor : '';
      calcCosto();
    }
 
    function applyCustomFactor() {
      selectedFactor = parseFloat(document.getElementById('cc-custom-val').value) || null;
      document.getElementById('cc-factor-label').textContent = selectedFactor ? '× ' + selectedFactor : '';
      calcCosto();
    }
 
    function calcPrecio() {
      const costo = parseFloat(document.getElementById('pc-costo').value);
      const ganancia = parseFloat(document.getElementById('pc-ganancia').value);
      const el = document.getElementById('pc-result');
      if (!isNaN(costo) && !isNaN(ganancia) && costo > 0 && ganancia > 0) {
        const val = costo * 1.15 * 1.011 * ganancia;
        el.textContent = val.toLocaleString('es', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      } else { el.textContent = '—'; }
    }
 
    function syncGanancia(slider) {
      const v = parseFloat(slider.value).toFixed(2);
      document.getElementById('pc-ganancia-display').textContent = v;
      document.getElementById('pc-ganancia').value = v;
      calcPrecio();
    }
 
    function syncGananciaInput(input) {
      const v = parseFloat(input.value);
      if (!isNaN(v)) {
        document.getElementById('pc-ganancia-display').textContent = v.toFixed(2);
        document.getElementById('pc-ganancia-slider').value = Math.min(Math.max(v, 1.0), 3.0);
      }
    }
 
    function calcCosto() {
      const precio = parseFloat(document.getElementById('cc-precio').value);
      const el = document.getElementById('cc-result');
      if (!isNaN(precio) && precio > 0 && selectedFactor) {
        const val = precio * selectedFactor * 26.6;
        el.textContent = val.toLocaleString('es', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      } else { el.textContent = '—'; }
    }
  </script>
 
</body>
</html>
